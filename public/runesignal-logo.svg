<svg width="200" height="44" viewBox="0 0 200 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RuneSignal">
  <!-- Rune glyph mark -->
  <!-- Vertical bar -->
  <line x1="22" y1="4" x2="22" y2="40" stroke="#10b981" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Upper left arm -->
  <line x1="22" y1="13" x2="9"  y2="5"  stroke="#10b981" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Upper right arm -->
  <line x1="22" y1="13" x2="35" y2="5"  stroke="#10b981" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Lower left arm -->
  <line x1="22" y1="27" x2="9"  y2="39" stroke="#3b82f6" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Lower right arm -->
  <line x1="22" y1="27" x2="35" y2="39" stroke="#3b82f6" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="50"
    y="29"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.03em"
    fill="#f1f5f9"
  >RuneSignal</text>
</svg>
