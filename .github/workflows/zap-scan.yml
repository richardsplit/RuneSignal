name: OWASP ZAP Baseline Scan

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan (overrides RUNESIGNAL_URL secret)'
        required: false
        type: string

permissions:
  contents: read
  issues: write   # ZAP action can open issues for findings

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine target URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ secrets.RUNESIGNAL_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          # Rules file lets us suppress known false positives over time
          rules_file_name: '.github/zap-rules.tsv'
          # Fail the build only on HIGH findings (WARN on MEDIUM)
          fail_action: true
          allow_issue_writing: true
          artifact_name: zap-baseline-report
          # Scan public routes only — authenticated routes require session setup
          cmd_options: >-
            -j
            -I
            -z "-config scanner.threadPerHost=5"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_number }}
          path: report_html.html
          retention-days: 90

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-json-${{ github.run_number }}
          path: report_json.json
          retention-days: 90
