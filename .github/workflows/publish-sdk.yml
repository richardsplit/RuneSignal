name: Publish runesignal SDK to PyPI

on:
  push:
    tags:
      - "sdk-v*"   # trigger: git tag sdk-v0.1.0 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: products/cost-intelligence/sdk/python
        run: python -m build

      - name: Check dist
        working-directory: products/cost-intelligence/sdk/python
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: products/cost-intelligence/sdk/python/dist/
          # Uses OIDC trusted publishing — no password needed.
          # Configure at: https://pypi.org/manage/project/runesignal/settings/publishing/
          # Add publisher: owner=richardsplit, repo=RuneSignal, workflow=publish-sdk.yml
