[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "runesignal-crewai"
version = "1.0.0"
description = "RuneSignal governance observer for CrewAI — firewall, HITL, and provenance for every task"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["runesignal", "crewai", "ai", "governance", "compliance", "hitl"]
dependencies = [
    "runesignal>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.urls]
Homepage = "https://runesignal.com"
Repository = "https://github.com/richardsplit/RuneSignal"

[tool.hatch.build.targets.wheel]
packages = ["runesignal_crewai"]
