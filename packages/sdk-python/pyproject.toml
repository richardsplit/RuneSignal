[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "runesignal"
version = "1.0.0"
description = "Official Python SDK for RuneSignal — AI Agent Governance: HITL approvals, Ed25519 provenance, EU AI Act evidence bundles, compliance controls"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = [
    "runesignal", "ai", "governance", "compliance", "hitl",
    "eu-ai-act", "iso42001", "agent", "provenance", "audit", "firewall"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "mypy>=1.8", "ruff>=0.3"]

[project.urls]
Homepage = "https://runesignal.com"
Documentation = "https://docs.runesignal.com"
Repository = "https://github.com/richardsplit/RuneSignal"

[tool.hatch.build.targets.wheel]
packages = ["runesignal"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.mypy]
python_version = "3.9"
strict = true
