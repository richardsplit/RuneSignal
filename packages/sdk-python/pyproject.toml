[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trustlayer"
version = "1.0.0"
description = "Official Python SDK for TrustLayer — AI Agent Action Firewall for Enterprise Systems"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["trustlayer", "ai", "governance", "firewall", "agent", "policy", "audit"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
async = ["httpx>=0.27.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "mypy>=1.8", "ruff>=0.3"]

[project.urls]
Homepage = "https://trustlayer.ai"
Documentation = "https://docs.trustlayer.ai"
Repository = "https://github.com/trustlayer/trustlayer-python"

[tool.hatch.build.targets.wheel]
packages = ["trustlayer"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.mypy]
python_version = "3.9"
strict = true
